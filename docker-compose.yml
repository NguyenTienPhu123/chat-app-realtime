version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: chat-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - chat-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb+srv://PTXProject:9SCnh2vzKOjpmTc8@clustergreen0.8pm1l5a.mongodb.net/?appName=ClusterGreen0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: hgfhbgfsduif348y39
      JWT_EXPIRES_IN: 60m
      REFRESH_TOKEN_SECRET: jdsbkwbg23y8349th
      REFRESH_TOKEN_EXPIRES_IN: 7d
      REFRESH_COOKIE_NAME: refreshToken
      RESET_TOKEN_EXPIRES_IN: 5m
      EMAIL_USER: xanhnguyen08@gmail.com
      EMAIL_APP_PASSWORD: oxwpirhhaacynaao
      EMAIL_FROM: xanhnguyen08@gmail.com
      CORS_ORIGIN: http://localhost
    depends_on:
      - redis
    volumes:
      - uploads_data:/app/uploads
    networks:
      - chat-network
    deploy:
      replicas: 2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chat-frontend
    restart: unless-stopped
    networks:
      - chat-network

  nginx:
    image: nginx:alpine
    container_name: chat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d
      - uploads_data:/app/uploads
    depends_on:
      - backend
      - frontend
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge

volumes:
  redis_data:
  uploads_data: